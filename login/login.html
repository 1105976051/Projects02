<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 口腔解剖生理学</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index/index.html" class="navbar-brand">
        <span>🦷</span>
        <span>口腔解剖生理学</span>
      </a>
      <button class="navbar-toggle" id="navbarToggle">☰</button>
      <ul class="navbar-nav" id="navbarNav">
        <li class="nav-item">
          <a href="../index/index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="learn.html" class="nav-link">学习</a>
        </li>
        <li class="nav-item">
          <a href="login.html" class="nav-link active">登录</a>
        </li>
        <li class="nav-item">
          <a href="my.html" class="nav-link">我的</a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">🦷</div>
        <h1 class="login-title">欢迎回来</h1>
        <p class="login-subtitle">登录以继续你的口腔解剖学习</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">账号</label>
          <input class="form-input" type="text" id="username" name="username" placeholder="请输入手机号或邮箱"
            autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码"
            autocomplete="current-password">
        </div>
        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" id="remember" name="remember">
            <span>记住我</span>
          </label>
          <a href="#" class="form-link">忘记密码？</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <p class="login-footer">还没有账号？<a href="#" class="form-link">立即注册</a></p>

      <div class="benefits" id="benefits"></div>
    </div>
  </main>

  <script src="login.js"></script>
  <script>
    (function () {
      const { loginBenefits } = window.loginData;

      document.getElementById('navbarToggle').addEventListener('click', function () {
        document.getElementById('navbarNav').classList.toggle('active');
      });

      document.getElementById('benefits').innerHTML = loginBenefits.map(item => `
        <div class="benefit-item">
          <i>${item.icon}</i>
          <div>
            <h4>${item.title}</h4>
            <p>${item.description}</p>
          </div>
        </div>
      `).join('');

      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          alert('请输入账号和密码');
          return;
        }
        alert('登录功能待接入后端');
      });
    })();
  </script>
</body>

</html>
